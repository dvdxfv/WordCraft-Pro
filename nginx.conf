# WordCraft Pro Nginx 配置文件
# 用于托管 WordCraft Pro Web 应用

server {
    listen 80;
    server_name wordcraft-pro.local;
    # 生产环境请替换为实际域名
    # server_name wordcraft-pro.example.com;

    # 静态文件服务
    location / {
        root /path/to/wordcraft-pro/web;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # 后端 API 代理
    # 假设后端服务运行在 127.0.0.1:5000
    location /api {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # 错误页面
    error_page 404 /404.html;
    error_page 500 502 503 504 /500.html;

    # 日志配置
    access_log /var/log/nginx/wordcraft-pro_access.log;
    error_log /var/log/nginx/wordcraft-pro_error.log;
}
