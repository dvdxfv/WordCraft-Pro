name: supabase-inactivity-watch

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run inactivity watch
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          FEISHU_BOT_WEBHOOK: ${{ secrets.FEISHU_BOT_WEBHOOK }}
          ALERT_PLATFORM: feishu
          FEISHU_BOT_SECRET: ${{ secrets.FEISHU_BOT_SECRET }}
        run: |
          set +e
          python tools/supabase_inactivity_watch.py --json
          code=$?
          set -e
          # Exit 1 = severity warning/critical (idle / pause risk). That is an alert, not a CI mis-run.
          # Exit 2 = missing secrets, network/API error, or webhook failure — those should fail the job.
          if [ "$code" -eq 1 ]; then
            echo "::notice::Supabase inactivity watch reported warning or critical. See JSON above; Feishu alert may have been sent."
            exit 0
          fi
          exit "$code"
