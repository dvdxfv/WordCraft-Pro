name: tests

on:
  pull_request:
  push:
    branches: [main, master]
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:

jobs:
  pr-gate:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest playwright python-docx
          python -m playwright install chromium
      - name: Unit + integration + smoke e2e
        env:
          WC_TEST_EMAIL: ${{ secrets.WC_TEST_EMAIL }}
          WC_TEST_PASSWORD: ${{ secrets.WC_TEST_PASSWORD }}
        run: |
          pytest -m "not slow and not external and (smoke or integration or not e2e)" -q
      - name: Batch regression canary (anti-rework)
        run: |
          pytest tests/test_batch_regression.py -v
      - name: Export docx regression canary
        env:
          WC_TEST_EMAIL: ${{ secrets.WC_TEST_EMAIL }}
          WC_TEST_PASSWORD: ${{ secrets.WC_TEST_PASSWORD }}
        run: |
          pytest tests/e2e/test_export_docx_regression.py -q
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts-pr
          path: tests/artifacts/**
          if-no-files-found: ignore

  nightly-full:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest playwright python-docx
          python -m playwright install chromium
      - name: Full e2e + slow suite
        env:
          WC_TEST_EMAIL: ${{ secrets.WC_TEST_EMAIL }}
          WC_TEST_PASSWORD: ${{ secrets.WC_TEST_PASSWORD }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
        run: |
          pytest -m "e2e or slow" -q
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts-nightly
          path: tests/artifacts/**
          if-no-files-found: ignore

