name: tests

on:
  pull_request:
  push:
    branches: [main, master]
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:

jobs:
  pr-gate:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest playwright python-docx
          python -m playwright install chromium
      - name: Core regression tests
        run: |
          pytest tests/test_batch_regression.py tests/test_format_checker.py tests/test_entitlements.py tests/test_document_structure.py -v
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts-pr
          path: tests/artifacts/**
          if-no-files-found: ignore

  nightly-full:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest playwright python-docx
          python -m playwright install chromium
      - name: Full e2e + slow suite
        env:
          WC_TEST_EMAIL: ${{ secrets.WC_TEST_EMAIL }}
          WC_TEST_PASSWORD: ${{ secrets.WC_TEST_PASSWORD }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
        run: |
          # test_performance_stress.py asserts tight timing/concurrency; shared GitHub runners
          # are too variable and routinely fail this file. Run it locally when needed.
          pytest -m "e2e or slow" -q --ignore=tests/test_performance_stress.py
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts-nightly
          path: tests/artifacts/**
          if-no-files-found: ignore

