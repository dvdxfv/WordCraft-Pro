[pytest]
addopts = -ra
testpaths = tests
norecursedirs = tests/scripts tests/artifacts tests/fixtures .git .venv venv
markers =
    smoke: fast smoke gate (PR required)
    regression: regression suite for main branch
    e2e: end-to-end browser workflow tests
    no_login: browser tests that must run without Supabase credentials
    integration: cross-module non-browser integration tests
    slow: long-running/performance tests
    external: relies on external network/model services
